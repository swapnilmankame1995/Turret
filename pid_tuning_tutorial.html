<style>
.step{padding:14px 16px;border-left:3px solid var(--color-border-tertiary);margin:8px 0;border-radius:0 8px 8px 0;background:var(--color-background-secondary)}
.step.active{border-left-color:#5DCAA5}
.step h3{font-size:14px;font-weight:500;color:var(--color-text-primary);margin:0 0 6px}
.step p{font-size:13px;color:var(--color-text-secondary);margin:0 0 6px;line-height:1.6}
.symptom{display:inline-block;font-size:12px;padding:2px 8px;border-radius:4px;margin:2px}
.bad{background:#FCEBEB;color:#A32D2D}
.good{background:#EAF3DE;color:#3B6D11}
.key{display:inline-block;font-size:11px;font-family:var(--font-mono);background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:3px;padding:1px 5px;color:var(--color-text-primary)}
.nav{display:flex;gap:8px;margin-top:12px}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:13px}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:#1D9E75;color:#E1F5EE;border-color:#1D9E75}
.dots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary)}
.dot.on{background:#1D9E75}
.diagram{width:100%;height:90px;margin:8px 0}
</style>

<div style="padding:8px 0">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
  <span style="font-size:13px;font-weight:500;color:var(--color-text-primary)">PID tuning guide — turret simulation</span>
  <div class="dots" id="dots"></div>
</div>

<div id="content"></div>

<div class="nav">
  <button class="btn" onclick="go(-1)">Back</button>
  <button class="btn primary" onclick="go(1)" id="nextbtn">Next</button>
  <span style="font-size:12px;color:var(--color-text-tertiary);align-self:center;margin-left:auto" id="counter"></span>
</div>
</div>

<script>
const steps = [
  {
    title: "What you'll see",
    body: `Lock onto a target with a left-click. You'll see two crosshairs:<br><br>
      <span class="symptom good">GREEN</span> — where the tracker says the target is<br>
      <span class="symptom" style="background:#FFF3E0;color:#854F0B">ORANGE</span> — where the simulated turret is pointing (driven by PID)<br><br>
      A grey line connects them — that's the current error. Your goal is to make the orange crosshair chase and catch the green one smoothly.`,
    diagram: `<svg class="diagram" viewBox="0 0 400 90">
      <line x1="120" y1="45" x2="280" y2="45" stroke="#888" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="270" y1="37" x2="290" y2="45" stroke="#1D9E75" stroke-width="2"/>
      <line x1="270" y1="53" x2="290" y2="45" stroke="#1D9E75" stroke-width="2"/>
      <line x1="280" y1="35" x2="280" y2="55" stroke="#1D9E75" stroke-width="2.5"/>
      <line x1="265" y1="45" x2="295" y2="45" stroke="#1D9E75" stroke-width="2.5"/>
      <circle cx="280" cy="45" r="14" fill="none" stroke="#1D9E75" stroke-width="1"/>
      <text x="280" y="72" text-anchor="middle" class="ts" style="fill:#1D9E75">target</text>
      <line x1="110" y1="35" x2="110" y2="55" stroke="#E07020" stroke-width="2.5"/>
      <line x1="96" y1="45" x2="124" y2="45" stroke="#E07020" stroke-width="2.5"/>
      <circle cx="110" cy="45" r="14" fill="none" stroke="#E07020" stroke-width="1"/>
      <text x="110" y="72" text-anchor="middle" class="ts" style="fill:#E07020">turret</text>
      <text x="200" y="38" text-anchor="middle" class="ts">error</text>
    </svg>`
  },
  {
    title: "Step 1 — set Ki and Kd to zero first",
    body: `Before tuning, zero out I and D so only P is active. This isolates each term.<br><br>
      Press <span class="key">K</span> repeatedly until <code>Ki = 0.000</code><br>
      Press <span class="key">L</span> repeatedly until <code>Kd = 0.000</code><br><br>
      Now you have a pure proportional controller. The orange crosshair will move toward the target proportionally to how far away it is.`,
    diagram: `<svg class="diagram" viewBox="0 0 400 90">
      <rect x="40" y="20" width="80" height="28" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
      <text x="80" y="39" text-anchor="middle" class="ts" style="fill:#085041">Kp = active</text>
      <rect x="160" y="20" width="80" height="28" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
      <text x="200" y="39" text-anchor="middle" class="ts" style="fill:#5F5E5A">Ki = 0</text>
      <rect x="280" y="20" width="80" height="28" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
      <text x="320" y="39" text-anchor="middle" class="ts" style="fill:#5F5E5A">Kd = 0</text>
    </svg>`
  },
  {
    title: "Step 2 — find the right Kp",
    body: `With only Kp active, move the target slowly. Watch the orange crosshair:<br><br>
      <span class="symptom bad">Too low Kp</span> — orange barely moves, lags far behind<br>
      <span class="symptom bad">Too high Kp</span> — orange overshoots, bounces back and forth<br>
      <span class="symptom good">Good Kp</span> — orange follows steadily, slight overshoot ok<br><br>
      Press <span class="key">U</span> to raise Kp. Stop when it just starts to oscillate, then press <span class="key">J</span> once or twice to back off.`,
    diagram: `<svg class="diagram" viewBox="0 0 400 90">
      <line x1="40" y1="60" x2="360" y2="60" stroke="#B4B2A9" stroke-width="0.5"/>
      <text x="50" y="75" class="ts" style="fill:var(--color-text-tertiary)">target</text>
      <polyline points="40,60 100,58 160,59 220,60 280,60 340,60" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 2"/>
      <polyline points="40,80 80,40 120,72 160,55 200,62 240,59 280,61 340,60" fill="none" stroke="#A32D2D" stroke-width="1.5"/>
      <text x="200" y="20" text-anchor="middle" class="ts" style="fill:#A32D2D">too high — oscillates</text>
      <polyline points="40,80 120,62 200,60 280,60 340,60" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="0"/>
      <text x="200" y="50" text-anchor="middle" class="ts" style="fill:#1D9E75">good — settles</text>
    </svg>`
  },
  {
    title: "Step 3 — add Kd to reduce overshoot",
    body: `If the orange crosshair overshoots the green one before settling, Kd is your fix. D acts like a brake — it resists rapid changes in error.<br><br>
      Press <span class="key">O</span> to raise Kd slowly (2–3 presses at a time).<br><br>
      <span class="symptom good">Good Kd</span> — overshoot disappears, smooth approach<br>
      <span class="symptom bad">Too high Kd</span> — crosshair becomes sluggish, jerky on fast targets<br><br>
      Typical Kd is about 10–15% of your Kp value.`,
    diagram: `<svg class="diagram" viewBox="0 0 400 90">
      <line x1="40" y1="55" x2="360" y2="55" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 2"/>
      <text x="370" y="58" class="ts" style="fill:var(--color-text-tertiary)">target</text>
      <polyline points="40,80 100,45 140,62 180,54 220,56 260,55 300,55 340,55" fill="none" stroke="#A32D2D" stroke-width="1.5"/>
      <text x="110" y="28" class="ts" style="fill:#A32D2D">without Kd</text>
      <polyline points="40,80 120,52 200,55 280,55 340,55" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
      <text x="280" y="42" class="ts" style="fill:#1D9E75">with Kd</text>
    </svg>`
  },
  {
    title: "Step 4 — add Ki only if needed",
    body: `Ki corrects for steady-state error — when the orange crosshair gets close but never quite reaches the green one.<br><br>
      For a turret this is usually not needed. Only add it if you see the orange crosshair consistently stopping 5–10px short.<br><br>
      If you do add it: press <span class="key">I</span> just 1–2 times. Ki accumulates over time — too much causes slow, wide oscillation that's hard to tune out.<br><br>
      <span class="symptom bad">Too high Ki</span> — slow growing oscillation, crosshair drifts in circles`,
    diagram: `<svg class="diagram" viewBox="0 0 400 90">
      <line x1="40" y1="45" x2="360" y2="45" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 2"/>
      <text x="370" y="48" class="ts" style="fill:var(--color-text-tertiary)">target</text>
      <polyline points="40,80 120,52 200,50 280,50 340,50" fill="none" stroke="#A32D2D" stroke-width="1.5"/>
      <text x="200" y="38" class="ts" style="fill:#A32D2D">no Ki — stops short</text>
      <polyline points="40,80 120,52 200,46 260,45 300,45 340,45" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
      <text x="290" y="35" class="ts" style="fill:#1D9E75">with small Ki</text>
    </svg>`
  },
  {
    title: "Step 5 — test with fast movement",
    body: `Once you have good gains on a slow target, move your hand fast across the camera frame.<br><br>
      <span class="symptom bad">Lags too far</span> — raise Kp slightly<br>
      <span class="symptom bad">Oscillates on fast moves</span> — raise Kd slightly<br>
      <span class="symptom good">Good</span> — orange catches up within 0.5–1 second, no oscillation<br><br>
      When satisfied, note down your Kp / Ki / Kd values — these are your starting gains for the real motor. They'll need a small re-tune on hardware but will be close.`,
    diagram: `<svg class="diagram" viewBox="0 0 400 90">
      <polyline points="40,60 100,60 140,20 180,20 220,20 260,60 300,60 360,60" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 2"/>
      <text x="200" y="14" text-anchor="middle" class="ts" style="fill:#1D9E75">target (fast move)</text>
      <polyline points="40,60 110,58 155,28 185,19 215,20 255,55 295,60 340,60" fill="none" stroke="#E07020" stroke-width="2"/>
      <text x="200" y="76" text-anchor="middle" class="ts" style="fill:#E07020">turret — follows with slight lag</text>
    </svg>`
  },
  {
    title: "Good starting values for a turret",
    body: `Based on your stepper prototype, these are reasonable starting points:<br><br>
      <code>Kp = 0.6</code> — default, works for most webcam-speed tracking<br>
      <code>Ki = 0.005</code> — very small, only if stopping short<br>
      <code>Kd = 0.06</code> — light damping<br><br>
      When you move to BLDC motors, re-tune from scratch — the motor response speed is completely different and these values won't transfer directly. Start the same way: zero Ki/Kd, find Kp first.`,
    diagram: `<svg class="diagram" viewBox="0 0 400 70">
      <rect x="40" y="10" width="90" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
      <text x="85" y="30" text-anchor="middle" class="th" style="fill:#085041">Kp = 0.6</text>
      <text x="85" y="46" text-anchor="middle" class="ts" style="fill:#0F6E56">raise first</text>
      <rect x="155" y="10" width="90" height="44" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
      <text x="200" y="30" text-anchor="middle" class="th" style="fill:#444441">Ki = 0.005</text>
      <text x="200" y="46" text-anchor="middle" class="ts" style="fill:#5F5E5A">add last</text>
      <rect x="270" y="10" width="90" height="44" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
      <text x="315" y="30" text-anchor="middle" class="th" style="fill:#0C447C">Kd = 0.06</text>
      <text x="315" y="46" text-anchor="middle" class="ts" style="fill:#185FA5">tune after Kp</text>
    </svg>`
  }
];

let cur = 0;

function render() {
  const s = steps[cur];
  document.getElementById('content').innerHTML = `
    <div class="step active">
      <h3>${cur+1}. ${s.title}</h3>
      <p>${s.body}</p>
      ${s.diagram || ''}
    </div>`;
  document.getElementById('counter').textContent = `${cur+1} of ${steps.length}`;
  document.getElementById('nextbtn').textContent = cur === steps.length-1 ? 'Done' : 'Next';
  const dots = document.getElementById('dots');
  dots.innerHTML = steps.map((_,i) =>
    `<div class="dot ${i===cur?'on':''}"></div>`).join('');
}

function go(dir) {
  cur = Math.max(0, Math.min(steps.length-1, cur+dir));
  render();
}

render();
</script>
